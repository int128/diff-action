name: ts

on:
  pull_request:
    paths:
      - src/**
      - tests/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/ts.yaml
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/ts.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm test

  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm build

      - name: e2e-test (directory)
        id: diff-directory
        uses: ./
        with:
          base: tests/fixtures/base
          head: tests/fixtures/head
          label: changed
      - uses: int128/comment-action@66317511bc86c47bd51e03059040e8a460a167b8 # v1.52.0
        with:
          update-if-exists: replace
          update-if-exists-key: e2e-test-directory
          post: |
            ## e2e-test (directory)
            ${{ steps.diff-directory.outputs.comment-body }}
      - run: test -n "$DIFF"
        env:
          DIFF: ${{ steps.diff-directory.outputs.comment-body }}

      - name: e2e-test (file)
        id: diff-file
        uses: ./
        with:
          base: tests/fixtures/base/service.yaml
          head: tests/fixtures/head/service.yaml
      - uses: int128/comment-action@66317511bc86c47bd51e03059040e8a460a167b8 # v1.52.0
        with:
          update-if-exists: replace
          update-if-exists-key: e2e-test-file
          post: |
            ## e2e-test (file)
            ${{ steps.diff-file.outputs.comment-body }}
      - run: test -n "$DIFF"
        env:
          DIFF: ${{ steps.diff-file.outputs.comment-body }}

      - name: e2e-test (no-diff)
        id: no-diff
        uses: ./
        with:
          base: tests/fixtures/head
          head: tests/fixtures/head
          label: changed
      - uses: int128/comment-action@66317511bc86c47bd51e03059040e8a460a167b8 # v1.52.0
        with:
          update-if-exists: replace
          update-if-exists-key: e2e-test-no-diff
          post: |
            ## e2e-test (no-diff)
            ${{ steps.no-diff.outputs.comment-body }}
      - run: test -z "$BODY"
        env:
          BODY: ${{ steps.no-diff.outputs.comment-body }}

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .node-version
          package-manager-cache: false
      - run: npm install -g pnpm@latest-10
      - run: pnpm i
      - run: pnpm run check
      - uses: int128/update-generated-files-action@9662c04ea188ea4238f93acda9e35e2edc49a385 # v2.82.0
