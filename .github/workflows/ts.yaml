name: ts

on:
  pull_request:
    paths:
      - src/**
      - tests/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/ts.yaml
  push:
    branches:
      - main
    paths:
      - src/**
      - tests/**
      - '*.json'
      - '*.yaml'
      - .github/workflows/ts.yaml

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g corepack
      - run: corepack enable
      - run: pnpm i
      - run: pnpm test

  e2e-test:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g corepack
      - run: corepack enable
      - run: pnpm i
      - run: pnpm build

      - name: e2e-test (directory)
        id: diff-directory
        uses: ./
        with:
          base: tests/fixtures/base
          head: tests/fixtures/head
          label: changed
      - uses: int128/comment-action@f1b8793eb5b418838c59535a043d8996bd7b5625 # v1.65.0
        with:
          update-if-exists: replace
          update-if-exists-key: e2e-test-directory
          post: |
            ## e2e-test (directory)
            ${{ steps.diff-directory.outputs.comment-body }}
      - run: test -n "$DIFF"
        env:
          DIFF: ${{ steps.diff-directory.outputs.comment-body }}

      - name: e2e-test (file)
        id: diff-file
        uses: ./
        with:
          base: tests/fixtures/base/service.yaml
          head: tests/fixtures/head/service.yaml
      - uses: int128/comment-action@f1b8793eb5b418838c59535a043d8996bd7b5625 # v1.65.0
        with:
          update-if-exists: replace
          update-if-exists-key: e2e-test-file
          post: |
            ## e2e-test (file)
            ${{ steps.diff-file.outputs.comment-body }}
      - run: test -n "$DIFF"
        env:
          DIFF: ${{ steps.diff-file.outputs.comment-body }}

      - name: e2e-test (no-diff)
        id: no-diff
        uses: ./
        with:
          base: tests/fixtures/head
          head: tests/fixtures/head
          label: changed
      - uses: int128/comment-action@f1b8793eb5b418838c59535a043d8996bd7b5625 # v1.65.0
        with:
          update-if-exists: replace
          update-if-exists-key: e2e-test-no-diff
          post: |
            ## e2e-test (no-diff)
            ${{ steps.no-diff.outputs.comment-body }}
      - run: test -z "$BODY"
        env:
          BODY: ${{ steps.no-diff.outputs.comment-body }}

  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
      - run: npm install -g corepack
      - run: corepack enable
      - run: pnpm i
      - run: pnpm run check
      - uses: int128/update-generated-files-action@02d855978f04d7d4d72c66425aa779260fd34883 # v2.98.0
